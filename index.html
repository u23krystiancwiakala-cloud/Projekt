<form id="myForm">
  <label>Imie: </label>
  <input type="text" id="imie" name="imie" required><br>
  
  <label>Nazwisko: </label>
  <input type="text" id="nazwisko" name="nazwisko" required><br>
  
  <label>E-mail: </label>
  <input type="email" id="email" name="email" required><br>
  
  <label>Opis problemu: </label>
  <input type="text" id="problem" name="problem" required><br>
  
  <label>Priorytet: </label>
  <input type="text" id="priorytet" name="priorytet" required><br>


  <label for="generatedIdInput">ID zgłoszenia: </label>
  <span id="wyswietlaczID" style="font-weight: bold; color: blue;">---</span><br>
  <input type="hidden" id="generatedIdInput" name="id_zgloszenia">

  <button type="button" onclick="generuj()">Wygeneruj ID</button>
  <button type="submit">Wyslij zgloszenie</button>
</form>

<script>
function generuj() {
    let ostatnieID = localStorage.getItem('mojeID') || 0;
    let noweID = parseInt(ostatnieID) + 1;
    localStorage.setItem('mojeID', noweID);
    
    
    document.getElementById('generatedIdInput').value = noweID;
    
    
    document.getElementById('wyswietlaczID').innerText = noweID;
}

document.getElementById('myForm').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const formData = new FormData(this);
  const data = Object.fromEntries(formData.entries());

  if (!data.id_zgloszenia) {
      alert("Najpierw wygeneruj ID!");
      return;
  }

  fetch('https://hook.eu1.make.com/18bar33dg1fy2k9pmlsidf5jk58jitzt', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  })
  .then(response => {
    if (response.ok) {
      alert('Zgłoszenie nr ' + data.id_zgloszenia + ' zostało wysłane!');
      this.reset();
      // Resetowanie wizualnego ID po wysłaniu
      document.getElementById('wyswietlaczID').innerText = "---"; 
    } else {
      alert('Wystąpił błąd przy wysyłaniu.');
    }
  })
  .catch(error => {
    console.error('Błąd:', error);
    alert('Błąd połączenia z serwerem.');
  });
});
</script>
